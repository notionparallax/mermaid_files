<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mermaid File Tree — Interactive Demo</title>
    <style>
        :root {
            --bg: #1e1e1e;
            --panel-bg: #252526;
            --border: #3c3c3c;
            --text: #cccccc;
            --text-muted: #888888;
            --accent: #569cd6;
            --connector: #555555;
            --dir-color: #e0e0e0;
            --file-color: #aaaaaa;
            --desc-color: #6a9955;
            --highlight-bg: rgba(255, 193, 7, 0.15);
            --highlight-border: #ffc107;
            --font-mono: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-sans);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        header h1 {
            font-size: 16px;
            font-weight: 600;
        }

        header span {
            font-size: 12px;
            color: var(--text-muted);
        }

        .container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .editor-panel {
            width: 45%;
            min-width: 300px;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            padding: 8px 16px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            background: var(--panel-bg);
            border-bottom: 1px solid var(--border);
        }

        textarea {
            flex: 1;
            background: var(--panel-bg);
            color: var(--text);
            border: none;
            padding: 16px;
            font-family: var(--font-mono);
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            outline: none;
            tab-size: 4;
        }

        .preview-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: auto;
        }

        .preview-content {
            flex: 1;
            padding: 24px;
            overflow: auto;
        }

        .error {
            color: #f44747;
            padding: 16px;
            font-family: var(--font-mono);
            font-size: 13px;
            white-space: pre-wrap;
        }

        footer {
            padding: 8px 20px;
            border-top: 1px solid var(--border);
            font-size: 11px;
            color: var(--text-muted);
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        /* Theme toggle */
        .theme-toggle {
            margin-left: auto;
            background: var(--panel-bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        /* Light theme */
        body.light {
            --bg: #ffffff;
            --panel-bg: #f5f5f5;
            --border: #e0e0e0;
            --text: #333333;
            --text-muted: #888888;
            --connector: #999999;
            --dir-color: #333333;
            --file-color: #555555;
            --desc-color: #6a9955;
            --highlight-bg: rgba(255, 193, 7, 0.2);
            --highlight-border: #ffc107;
        }
    </style>
</head>

<body>

    <header>
        <h1>filetree</h1>
        <span>Interactive Demo — Proposed Mermaid Diagram Type</span>
        <div style="display:flex;gap:6px;margin-left:16px">
            <button class="theme-toggle" onclick="loadExample('indent')">Indent Example</button>
            <button class="theme-toggle" onclick="loadExample('ascii')">ASCII Example</button>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()" style="margin-left:auto">Toggle Light/Dark</button>
    </header>

    <div class="container">
        <div class="editor-panel">
            <div class="panel-header">Source</div>
            <textarea id="input" spellcheck="false">filetree
    my-project/
        node_modules/  ## (gitignored)
        public/
            favicon.ico
            index.html  ## main HTML shell
            robots.txt
        src/
            components/
                Button.tsx :::highlight  ## new component
                Header.tsx
                Footer.tsx
            hooks/
                useAuth.ts  ## authentication hook
            utils/
                helpers.ts
                constants.ts
            App.tsx :::highlight  ## app root
            index.css
            index.tsx  ## entry point
        .env  ## local environment vars
        .gitignore
        Dockerfile
        package.json  ## project manifest
        tsconfig.json
        README.md</textarea>
        </div>

        <div class="preview-panel">
            <div class="panel-header">Rendered Preview</div>
            <div class="preview-content" id="preview"></div>
        </div>
    </div>

    <footer>
        Icons inspired by
        <a href="https://github.com/PKief/vscode-material-icon-theme" target="_blank" rel="noopener">Material Icon
            Theme</a> (MIT) &amp;
        <a href="https://github.com/microsoft/vscode-codicons" target="_blank" rel="noopener">Codicons</a> (MIT).
        This demo is a proof-of-concept for the
        <a href="https://github.com/mermaid-js/mermaid/issues" target="_blank" rel="noopener">Mermaid filetree
            proposal</a>.
    </footer>

            swift: { color: '#f05138', path: 'M13 3.6C12.7 2 11 1 9 1.5c.8 1 1.3 2.2 1 3.5-.2.9-.8 1.6-1.5 2C7 5.7 5.2 3.5 5.2 3.5S7.5 7 9.2 8.3C7.3 9.5 4 8.5 4 8.5s3.5 3 7 2c1.5-.4 2.5-1.5 2.8-3 .3-1.5-.1-2.8-.8-3.9z' },
            cpp: { color: '#00589d', path: 'M8 1a7 7 0 1 0 0 14A7 7 0 0 0 8 1zm.5 2.5c1.7 0 3 .8 3.7 2l-1.5.9c-.4-.7-1.2-1.2-2.2-1.2-1.6 0-2.8 1.2-2.8 2.8S6.9 10.8 8.5 10.8c1 0 1.8-.5 2.2-1.2l1.5.9c-.7 1.2-2 2-3.7 2C6 12.5 4 10.5 4 8s2-4.5 4.5-4.5zM11 6h.5v1H12v.5h-.5v1H11v-1h-.5V7H11V6zm2 0h.5v1H14v.5h-.5v1H13v-1h-.5V7H13V6z' },
            c: { color: '#a8b9cc', path: 'M8 1a7 7 0 1 0 0 14A7 7 0 0 0 8 1zm.5 2.5c1.7 0 3 .8 3.7 2l-1.5.9c-.4-.7-1.2-1.2-2.2-1.2-1.6 0-2.8 1.2-2.8 2.8S6.9 10.8 8.5 10.8c1 0 1.8-.5 2.2-1.2l1.5.9c-.7 1.2-2 2-3.7 2C6 12.5 4 10.5 4 8s2-4.5 4.5-4.5z' },
        };

        // ──────────────────────────────────────────────────
        // Icon resolution  (§2 of the spec)
        // ──────────────────────────────────────────────────
        const FILENAME_ICONS = {
            '.gitignore': 'git', '.eslintrc': 'config', '.eslintrc.js': 'config',
            '.eslintrc.json': 'config', '.prettierrc': 'config', 'Dockerfile': 'docker',
            'docker-compose.yml': 'docker', 'docker-compose.yaml': 'docker',
            'Makefile': 'terminal', 'LICENSE': 'license', 'README.md': 'markdown',
            '.env': 'env', '.env.local': 'env', '.env.production': 'env',
            'tsconfig.json': 'typescript', 'vite.config.ts': 'config',
            'webpack.config.js': 'config', 'package-lock.json': 'lock',
            'yarn.lock': 'lock', 'pnpm-lock.yaml': 'lock',
        };

        const EXTENSION_ICONS = {
            '.js': 'javascript', '.mjs': 'javascript', '.cjs': 'javascript',
            '.jsx': 'react', '.ts': 'typescript', '.tsx': 'react',
            '.py': 'python', '.rb': 'ruby', '.rs': 'rust', '.go': 'go',
            '.java': 'java', '.kt': 'kotlin', '.cs': 'csharp',
            '.cpp': 'cpp', '.c': 'c', '.h': 'c', '.swift': 'swift',
            '.html': 'html', '.htm': 'html', '.css': 'css', '.scss': 'css',
            '.sass': 'css', '.less': 'css', '.json': 'json', '.yaml': 'yaml',
            '.yml': 'yaml', '.toml': 'config', '.xml': 'xml',
            '.svg': 'image', '.png': 'image', '.jpg': 'image', '.jpeg': 'image',
            '.gif': 'image', '.webp': 'image', '.ico': 'image',
            '.md': 'markdown', '.mdx': 'markdown', '.txt': 'text',
            '.sh': 'terminal', '.bash': 'terminal', '.zsh': 'terminal',
            '.ps1': 'terminal', '.bat': 'terminal', '.sql': 'database',
            '.graphql': 'graphql', '.gql': 'graphql', '.lock': 'lock',
            '.log': 'text', '.csv': 'table', '.vue': 'vue', '.svelte': 'svelte',
        };

        function resolveIcon(label, nodeType, iconOverride) {
            if (iconOverride) return iconOverride;
            if (FILENAME_ICONS[label]) return FILENAME_ICONS[label];
            if (nodeType === 'directory') return 'folder';
            const dotIdx = label.lastIndexOf('.');
            if (dotIdx > 0) {
                const ext = label.slice(dotIdx).toLowerCase();
                if (EXTENSION_ICONS[ext]) return EXTENSION_ICONS[ext];
            }
            return 'file';
        }

        // ──────────────────────────────────────────────────
        // Parser  (§6 of the spec — dual format)
        // ──────────────────────────────────────────────────
        const BOX_CHARS = /[│├└─]/;

        function detectFormat(lines) {
            return lines.some(l => BOX_CHARS.test(l)) ? 'ascii' : 'indent';
        }

        function parseLine(content) {
            let description = null;
            const descIdx = content.indexOf('##');
            if (descIdx >= 0) {
                description = content.slice(descIdx + 2).trim();
                content = content.slice(0, descIdx).trim();
            }
            let classes = [];
            const classMatch = content.match(/\s*:::([\w-]+)/);
            if (classMatch) {
                classes.push(classMatch[1]);
                content = content.replace(/\s*:::[\w-]+/, '').trim();
            }
            let iconOverride = null;
            const iconMatch = content.match(/\s*icon\(([\w-]+)\)/);
            if (iconMatch) {
                iconOverride = iconMatch[1];
                content = content.replace(/\s*icon\([\w-]+\)/, '').trim();
            }
            const isDir = content.endsWith('/');
            const label = isDir ? content.slice(0, -1) : content;
            const nodeType = isDir ? 'directory' : 'file';
            return { label, nodeType, classes, iconOverride, description };
        }

        function buildTree(flat) {
            const roots = [];
            const stack = [];
            for (const node of flat) {
                while (stack.length > 0 && stack[stack.length - 1].depth >= node.depth) {
                    stack.pop();
                }
                if (stack.length === 0) {
                    roots.push(node);
                } else {
                    stack[stack.length - 1].node.children.push(node);
                }
                stack.push({ node, depth: node.depth });
            }
            return roots;
        }

        function parseIndent(dataLines) {
            let indentUnit = 0;
            const firstLineIndent = dataLines[0].raw.search(/\S/);
            for (const dl of dataLines) {
                const indent = dl.raw.search(/\S/);
                if (indent > firstLineIndent && indentUnit === 0) {
                    indentUnit = indent - firstLineIndent;
                    break;
                }
            }
            if (indentUnit === 0) indentUnit = 4;

            const flat = [];
            for (const dl of dataLines) {
                const rawIndent = dl.raw.search(/\S/);
                const depth = Math.round((rawIndent - firstLineIndent) / indentUnit);
                const { label, nodeType, classes, iconOverride, description } = parseLine(dl.raw.trim());
                const iconId = resolveIcon(dl.raw.trim().split(/\s*:::/)[0].split(/\s*icon\(/)[0].split(/\s*##/)[0].trim(), nodeType, iconOverride);
                flat.push({ label, nodeType, depth, iconId, classes, description, children: [], lineNo: dl.lineNo });
            }
            return flat;
        }

        function parseAscii(dataLines) {
            const prefixPattern = /^((?:[│├└─][\s─]*|    )*)/;
            const flat = [];
            for (const dl of dataLines) {
                const line = dl.raw;
                // Count depth by scanning 4-char prefix segments
                let depth = 0;
                let pos = 0;
                while (pos + 3 <= line.length) {
                    const seg = line.slice(pos, pos + 4);
                    if (seg === '├── ' || seg === '└── ' || seg === '│   ' || seg === '    ') {
                        depth++;
                        pos += 4;
                    } else if (line.slice(pos, pos + 3) === '├──' || line.slice(pos, pos + 3) === '└──') {
                        // Handle case where there's no trailing space (end of prefix)
                        depth++;
                        pos += 3;
                        if (line[pos] === ' ') pos++;
                        break;
                    } else {
                        break;
                    }
                }
                const content = line.slice(pos).trim();
                if (!content) continue;

                const { label, nodeType, classes, iconOverride, description } = parseLine(content);
                const rawLabel = content.split(/\s*:::/)[0].split(/\s*icon\(/)[0].split(/\s*##/)[0].trim();
                const iconId = resolveIcon(rawLabel, nodeType, iconOverride);
                flat.push({ label, nodeType, depth, iconId, classes, description, children: [], lineNo: dl.lineNo });
            }
            return flat;
        }

        function parse(text) {
            const lines = text.split('\n');

            // Remove the 'filetree' keyword line
            let startIdx = 0;
            for (let i = 0; i < lines.length; i++) {
                if (lines[i].trim().toLowerCase() === 'filetree') { startIdx = i + 1; break; }
            }

            const dataLines = [];
            for (let i = startIdx; i < lines.length; i++) {
                const line = lines[i];
                if (line.trim() === '' || line.trim().startsWith('%%')) continue;
                dataLines.push({ raw: line, lineNo: i + 1 });
            }

            if (dataLines.length === 0) throw new Error('filetree diagram has no nodes');

            const format = detectFormat(dataLines.map(dl => dl.raw));
            const flat = format === 'ascii' ? parseAscii(dataLines) : parseIndent(dataLines);
            const roots = buildTree(flat);

            return { type: 'filetree', nodes: roots, flat };
        }

        // ──────────────────────────────────────────────────
        // Renderer  (§3 of the spec)
        // ──────────────────────────────────────────────────
        const CFG = {
            marginLeft: 12,
            marginTop: 8,
            indentWidth: 22,
            lineHeight: 28,
            iconSize: 16,
            iconGap: 6,
            descGap: 12,
            fontSize: 14,
        };

        function renderIcon(iconId, x, y) {
            const icon = ICONS[iconId] || ICONS.file;
            return `<g transform="translate(${x},${y})">
    <path d="${icon.path}" fill="${icon.color}" fill-rule="evenodd"/>
  </g>`;
        }

        function render(ast) {
            // Flatten with parent/lastChild info
            const items = [];
            function walk(nodes, parentIdx) {
                for (let i = 0; i < nodes.length; i++) {
                    const node = nodes[i];
                    const idx = items.length;
                    items.push({
                        node,
                        parentIdx,
                        isLast: i === nodes.length - 1,
                        depth: node.depth,
                    });
                    walk(node.children, idx);
                }
            }
            walk(ast.nodes, -1);

            // For each depth, track which items still have siblings below them
            // so we know where to draw continuing vertical lines
            const lastChildAtDepth = {};

            // Pre-compute: for each item, what's the set of depths that have
            // a continuing vertical line through this row?
            const activeConnectors = [];
            // Tracks the last item index at each depth
            const lastAtDepth = {};
            for (let i = items.length - 1; i >= 0; i--) {
                const depth = items[i].depth;
                if (!(depth in lastChildAtDepth)) lastChildAtDepth[depth] = i;
            }

            // Simpler approach: for each item, find parent chain and check
            // if each ancestor is the last child
            for (let i = 0; i < items.length; i++) {
                const active = new Set();
                let cur = i;
                while (cur >= 0 && items[cur].parentIdx >= 0) {
                    const parent = items[cur].parentIdx;
                    if (!items[cur].isLast) {
                        active.add(items[cur].depth);
                    }
                    cur = parent;
                    // Also check if parent is not last
                    if (cur >= 0 && !items[cur].isLast && items[cur].parentIdx >= 0) {
                        active.add(items[cur].depth);
                    }
                }
                activeConnectors.push(active);
            }

            const svgParts = [];
            const maxDepth = Math.max(...items.map(it => it.depth), 0);
            let maxTextRight = 0;

            for (let i = 0; i < items.length; i++) {
                const { node, parentIdx, isLast, depth } = items[i];
                const x = CFG.marginLeft + depth * CFG.indentWidth;
                const y = CFG.marginTop + i * CFG.lineHeight;
                const cy = y + CFG.lineHeight / 2; // vertical centre of this row

                const groupClass = `ft-node ft-${node.nodeType}${node.classes.includes('highlight') ? ' ft-highlight' : ''}`;

                let nodeHtml = '';

                // Highlight background
                if (node.classes.includes('highlight')) {
                    nodeHtml += `<rect x="${x - 4}" y="${y + 2}" width="500" height="${CFG.lineHeight - 4}" rx="3"
        fill="var(--highlight-bg)" stroke="var(--highlight-border)" stroke-width="1" />`;
                }

                // Connector lines
                if (parentIdx >= 0) {
                    const parentY = CFG.marginTop + parentIdx * CFG.lineHeight;
                    const lineX = x - CFG.indentWidth / 2;
                    // Vertical line from parent down to this node
                    nodeHtml += `<line x1="${lineX}" y1="${parentY + CFG.lineHeight}" x2="${lineX}" y2="${cy}"
        stroke="var(--connector)" stroke-width="1" aria-hidden="true"/>`;
                    // Horizontal stub
                    nodeHtml += `<line x1="${lineX}" y1="${cy}" x2="${x - 2}" y2="${cy}"
        stroke="var(--connector)" stroke-width="1" aria-hidden="true"/>`;
                }

                // Continuing vertical lines for ancestors
                for (let d = 0; d < depth; d++) {
                    if (activeConnectors[i].has(d)) {
                        const lineX = CFG.marginLeft + d * CFG.indentWidth + CFG.indentWidth / 2;
                        // We don't draw these here—handled by the parent-to-child vertical lines
                    }
                }

                // Icon
                const iconX = x;
                const iconY = cy - CFG.iconSize / 2;
                nodeHtml += renderIcon(node.iconId, iconX, iconY);

                // Label
                const textX = x + CFG.iconSize + CFG.iconGap;
                const labelClass = node.nodeType === 'directory' ? 'ft-label-dir' : 'ft-label-file';
                const fontWeight = node.nodeType === 'directory' ? 'bold' : 'normal';
                const fillColor = node.nodeType === 'directory' ? 'var(--dir-color)' : 'var(--file-color)';
                nodeHtml += `<text x="${textX}" y="${cy + 5}" font-family="var(--font-sans)"
      font-size="${CFG.fontSize}" font-weight="${fontWeight}" fill="${fillColor}"
      class="ft-label ${labelClass}">${escapeHtml(node.label)}</text>`;

                // Estimate text width for description positioning
                const estLabelWidth = node.label.length * 8.4;

                // Description
                if (node.description) {
                    const descX = textX + estLabelWidth + CFG.descGap;
                    nodeHtml += `<text x="${descX}" y="${cy + 5}" font-family="var(--font-sans)"
        font-size="${CFG.fontSize - 1}" font-style="italic" fill="var(--desc-color)"
        class="ft-description">${escapeHtml(node.description)}</text>`;
                    maxTextRight = Math.max(maxTextRight, descX + node.description.length * 7.5);
                } else {
                    maxTextRight = Math.max(maxTextRight, textX + estLabelWidth);
                }

                svgParts.push(`<g class="${groupClass}" role="treeitem" aria-level="${depth + 1}"${node.nodeType === 'directory' ? ' aria-expanded="true"' : ''}>${nodeHtml}</g>`);
            }

            const totalHeight = CFG.marginTop + items.length * CFG.lineHeight + 16;
            const totalWidth = Math.max(maxTextRight + 32, 400);

            return `<svg xmlns="http://www.w3.org/2000/svg" role="tree" class="filetree"
      width="${totalWidth}" height="${totalHeight}" viewBox="0 0 ${totalWidth} ${totalHeight}"
      style="font-family: var(--font-sans);">
    ${svgParts.join('\n    ')}
  </svg>`;
        }

        function escapeHtml(text) {
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        // ──────────────────────────────────────────────────
        // Wiring
        // ──────────────────────────────────────────────────
        const input = document.getElementById('input');
        const preview = document.getElementById('preview');

        function update() {
            try {
                const ast = parse(input.value);
                const svg = render(ast);
                preview.innerHTML = svg;
            } catch (e) {
                preview.innerHTML = `<div class="error">${escapeHtml(e.message)}</div>`;
            }
        }

        input.addEventListener('input', update);
        update(); // initial render

        function toggleTheme() {
            document.body.classList.toggle('light');
        }

        const EXAMPLES = {
            indent: `filetree
    my-project/
        node_modules/  ## (gitignored)
        public/
            favicon.ico
            index.html  ## main HTML shell
            robots.txt
        src/
            components/
                Button.tsx :::highlight  ## new component
                Header.tsx
                Footer.tsx
            hooks/
                useAuth.ts  ## authentication hook
            utils/
                helpers.ts
                constants.ts
            App.tsx :::highlight  ## app root
            index.css
            index.tsx  ## entry point
        .env  ## local environment vars
        .gitignore
        Dockerfile
        package.json  ## project manifest
        tsconfig.json
        README.md`,
            ascii: `filetree
my-project/
├── node_modules/  ## (gitignored)
├── public/
│   ├── favicon.ico
│   ├── index.html  ## main HTML shell
│   └── robots.txt
├── src/
│   ├── components/
│   │   ├── Button.tsx :::highlight  ## new component
│   │   ├── Header.tsx
│   │   └── Footer.tsx
│   ├── hooks/
│   │   └── useAuth.ts  ## authentication hook
│   ├── utils/
│   │   ├── helpers.ts
│   │   └── constants.ts
│   ├── App.tsx :::highlight  ## app root
│   ├── index.css
│   └── index.tsx  ## entry point
├── .env  ## local environment vars
├── .gitignore
├── Dockerfile
├── package.json  ## project manifest
├── tsconfig.json
└── README.md`,
        };

        function loadExample(name) {
            input.value = EXAMPLES[name];
            update();
        }
    </script>
</body>
